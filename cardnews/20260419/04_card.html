<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1080px; height:1350px;
  background:#030306;
  font-family:'Noto Sans KR',sans-serif;
  color:#F4F4F6;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.top-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:40px 56px 0;
}
.logo {
  font-size:20px; font-weight:900; letter-spacing:3px;
}
.logo .n { color:#FF2D20; }
.logo .mag { font-size:10px; color:#555; letter-spacing:5px; margin-left:4px; }
.page-num {
  font-size:14px; font-weight:700; color:#333; letter-spacing:2px;
}
.category-bar {
  margin:28px 56px 0;
  display:flex; align-items:center; gap:12px;
}
.cat-tag {
  padding:6px 16px; border-radius:4px;
  font-size:12px; font-weight:800; letter-spacing:1px;
  background:rgba(255,45,32,.1); border:1px solid rgba(255,45,32,.2); color:#FF2D20;
}
.viral-tag {
  padding:6px 16px; border-radius:4px;
  font-size:14px; font-weight:900;
  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
  color:#FF2D20;
}
.title-area {
  padding:36px 56px 0;
  flex-shrink:0;
}
.title {
  font-size:42px; font-weight:900; line-height:1.25;
  letter-spacing:-1px;
  max-height:210px; overflow:hidden;
}
.body-area {
  padding:32px 56px 0;
  flex:1;
  overflow:hidden;
}
.body-text {
  font-size:22px; font-weight:400; line-height:1.75;
  color:#AAA;
}
.bottom-bar {
  padding:32px 56px 40px;
  display:flex; align-items:center; justify-content:space-between;
  border-top:1px solid rgba(255,255,255,.06);
  margin-top:auto;
}
.source {
  font-size:13px; color:#444; font-weight:700; letter-spacing:.5px;
}
.swipe {
  font-size:13px; color:#333; font-weight:700;
  display:flex; align-items:center; gap:6px;
}
.red-line {
  position:absolute; top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg, #FF2D20, transparent);
}
</style></head>
<body>
  <div class="red-line"></div>
  <div class="top-bar">
    <div class="logo"><span class="n">NO</span>GEAR<span class="mag">MAGAZINE</span></div>
    <div class="page-num">4/4</div>
  </div>
  <div class="category-bar">
    <div class="cat-tag">스테로이드</div>
    <div class="viral-tag">🔴 91</div>
  </div>
  <div class="title-area">
    <div class="title">스테로이드 사용자, 심근병증 위험 9배 높다 - 2025년 연구</div>
  </div>
  <div class="body-area">
    <div class="body-text">2025년 독일 연구팀이 발표한 논문에서 스테로이드 사용자의 심근병증(심장 근육의 염증) 위험이 일반 대중 대비 9배 높다고 보고했다. 특히 장기 사용자들은 심장 기능 저하, 부정맥, 심부전으로 진행될 수 있는 미세한 구조적 변화를 보였다. 연구진은 이러한 변화가 용량과 사용 기간에 비례하며, 일단 발생하면 회복이 거의 불가능하다고 강조했다.</div>
  </div>
  <div class="bottom-bar">
    <div class="source">📄 Circulation</div>
    <div class="swipe">FXXK FAKES. STAY NATURAL.</div>
  </div>
</body></html>
