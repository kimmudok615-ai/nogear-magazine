<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;background:#030306;font-family:'Noto Sans KR',sans-serif;color:#F4F4F6;overflow:hidden;position:relative;}
.top-bar{position:absolute;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 56px;border-bottom:1px solid rgba(255,255,255,.06);}
.top-bar .logo{font-family:'Space Grotesk';font-size:16px;font-weight:900;letter-spacing:2px;}
.top-bar .logo .n{color:#FF2D20;}
.top-bar .page{font-family:'Space Grotesk';font-size:12px;font-weight:800;color:#888;letter-spacing:3px;}
.header{position:absolute;top:120px;left:56px;right:56px;}
.header .label{display:inline-block;padding:6px 14px;background:#F4F4F6;color:#000;font-family:'Space Grotesk';font-size:11px;font-weight:900;letter-spacing:3px;margin-bottom:18px;}
.header .title{font-size:58px;font-weight:900;line-height:1.05;letter-spacing:-2px;}
.header .title .red{color:#FF2D20;}
.stats-wrap{position:absolute;top:370px;left:56px;right:56px;}
.footer{position:absolute;bottom:50px;left:56px;right:56px;display:flex;align-items:center;justify-content:space-between;font-family:'Space Grotesk';font-size:11px;letter-spacing:2px;}
.footer .src{color:#333;}
.footer .arrow{color:#FF2D20;font-weight:800;}
</style></head>
<body>
  <div class="top-bar">
    <div class="logo"><span class="n">NO</span>GEAR MAGAZINE</div>
    <div class="page">05 / 06</div>
  </div>

    <div class="title">숫자가 <span class="red">증명한다</span></div>
  </div>
  <div class="stats-wrap">
        <div style="padding:40px 0;border-bottom:1px solid rgba(255,255,255,.08);">
          <div style="display:flex;align-items:baseline;gap:24px;">
            <div style="font-family:'Space Grotesk';font-size:100px;font-weight:900;color:#FF2D20;line-height:1;letter-spacing:-3px;min-width:280px;">9배</div>
            <div style="font-size:18px;color:#888;line-height:1.5;font-weight:500;">9배. 스테로이드로 망가진 심장은 돌아오지 않는다...</div>
          </div>
        </div>
        <div style="padding:40px 0;border-bottom:1px solid rgba(255,255,255,.08);">
          <div style="display:flex;align-items:baseline;gap:24px;">
            <div style="font-family:'Space Grotesk';font-size:100px;font-weight:900;color:#FF2D20;line-height:1;letter-spacing:-3px;min-width:280px;">5배</div>
            <div style="font-size:18px;color:#888;line-height:1.5;font-weight:500;">프로 보디빌더, 급성심장사 위험 아마추어보다 5배 높다 — EHJ 202...</div>
          </div>
        </div>
        <div style="padding:40px 0;border-bottom:1px solid rgba(255,255,255,.08);">
          <div style="display:flex;align-items:baseline;gap:24px;">
            <div style="font-family:'Space Grotesk';font-size:100px;font-weight:900;color:#FF2D20;line-height:1;letter-spacing:-3px;min-width:280px;">19</div>
            <div style="font-size:18px;color:#888;line-height:1.5;font-weight:500;">19살 브라질 보디빌더, 스테로이드 심장마비로 사망...</div>
          </div>
        </div></div>
  <div class="footer">
    <div class="src">VERIFIED · PubMed · Journals</div>
    <div class="arrow">NEXT →</div>
  </div>
</body></html>
