<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;background:#030306;font-family:'Noto Sans KR',sans-serif;color:#F4F4F6;overflow:hidden;position:relative;}
.grain{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.02) 1px,transparent 1px);background-size:3px 3px;pointer-events:none;}
.top-bar{position:absolute;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 56px;border-bottom:1px solid rgba(255,255,255,.06);}
.top-bar .logo{font-family:'Space Grotesk';font-size:16px;font-weight:900;letter-spacing:2px;}
.top-bar .logo .n{color:#FF2D20;}
.top-bar .page{font-family:'Space Grotesk';font-size:12px;font-weight:800;color:#888;letter-spacing:3px;}
.cat-chip{position:absolute;top:90px;left:56px;display:inline-block;padding:8px 18px;background:#FF2D20;color:#000;font-family:'Space Grotesk';font-size:12px;font-weight:900;letter-spacing:2px;}
.score-corner{position:absolute;top:90px;right:56px;display:flex;align-items:center;gap:8px;}
.score-corner .dot{width:10px;height:10px;border-radius:50%;background:#FF2D20;box-shadow:0 0 16px #FF2D20;}
.score-corner .num{font-family:'Space Grotesk';font-size:22px;font-weight:900;color:#FF2D20;}
.title-block{position:absolute;top:180px;left:56px;right:56px;z-index:10;}
.title-block .main{font-size:56px;font-weight:900;line-height:1.12;letter-spacing:-1.5px;color:#F4F4F6;margin-bottom:32px;}
.title-block .main .hl{background:linear-gradient(180deg,transparent 60%,#FF2D20 60%);padding:0 4px;color:#F4F4F6;}
.divider{position:absolute;top:640px;left:56px;right:56px;height:2px;background:linear-gradient(90deg,#FF2D20 30%,transparent 100%);}
.summary{position:absolute;top:680px;left:56px;right:56px;font-size:21px;font-weight:400;line-height:1.7;color:#888;letter-spacing:-.3px;}
.summary strong{color:#F4F4F6;font-weight:700;}
.footer{position:absolute;bottom:50px;left:56px;right:56px;display:flex;align-items:center;justify-content:space-between;font-family:'Space Grotesk';font-size:11px;letter-spacing:2px;}
.footer .src{color:#333;}
.footer .arrow{color:#FF2D20;font-weight:800;}
.corner-mark{position:absolute;bottom:50px;left:56px;width:24px;height:24px;border-left:2px solid #FF2D20;border-bottom:2px solid #FF2D20;}
</style></head>
<body>
  <div class="grain"></div>
  <div style="position:absolute;top:760px;right:56px;font-family:'Space Grotesk';font-size:280px;font-weight:900;color:#FF2D20;opacity:.08;line-height:1;letter-spacing:-10px;pointer-events:none;">9배</div>
  <div style="position:absolute;top:870px;left:56px;width:64px;height:64px;opacity:.8;"><svg viewBox="0 0 64 64" style="width:100%;height:100%;">
<path d="M32 56 C32 56 8 40 8 24 C8 16 14 10 22 10 C27 10 32 14 32 20 C32 14 37 10 42 10 C50 10 56 16 56 24 C56 40 32 56 32 56 Z" fill="none" stroke="#FF2D20" stroke-width="3"/>
<path d="M20 28 L26 22 L30 32 L36 18 L40 28 L44 24" fill="none" stroke="#FF2D20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg></div>
  <div class="top-bar">
    <div class="logo"><span class="n">NO</span>GEAR MAGAZINE</div>
    <div class="page">02 / 06</div>
  </div>
  <div class="cat-chip">스테로이드</div>
  <div class="score-corner"><div class="dot"></div><div class="num">93</div></div>

  <div class="title-block">
    <div class="main">9배. 스테로이드로 망가진 심장은 돌아오지 않는다</div>
  </div>

  <div class="divider"></div>
  <div class="summary">2025년 Circulation에 발표된 11년 장기 추적 연구에서 1,189명의 스테로이드 사용자와 59,450명의 대조군을 비교한 결과, AAS 사용자의 심근병증 발병률이 정상인의 9배 높았다. 부정맥이 가장 흔한 심혈관 합병증이었으며, 정맥혈전색전증과 구조적 심장 변화는 중단 후 수년이 지난 후에도 지속됐다....</div>

  <div class="footer">
    <div class="src">SOURCE · Circulation / AHA Journals</div>
    <div class="arrow">CONTINUE →</div>
  </div>
</body></html>
