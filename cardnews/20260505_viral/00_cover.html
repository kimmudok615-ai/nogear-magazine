<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;background:#030306;font-family:'Noto Sans KR',sans-serif;color:#F4F4F6;overflow:hidden;position:relative;}
.cover-bg{position:absolute;inset:0;background-image:url('../assets/fire.jpg');background-size:cover;background-position:center;filter:grayscale(85%) contrast(1.3) brightness(.4);opacity:.5;z-index:0;}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(3,3,6,.4) 0%,rgba(3,3,6,.75) 50%,rgba(3,3,6,.98) 100%);z-index:1;}
.cover-vignette{position:absolute;inset:0;background:radial-gradient(circle at 50% 40%, transparent 20%, rgba(3,3,6,.6) 80%);z-index:2;}
.grain{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.02) 1px,transparent 1px);background-size:3px 3px;pointer-events:none;z-index:3;}
.noise-lines{position:absolute;top:0;left:0;right:0;height:100%;background:linear-gradient(90deg,transparent 98%,rgba(255,45,32,.04) 100%);background-size:60px 100%;pointer-events:none;z-index:3;}
.top-strip{position:absolute;top:0;left:0;right:0;height:60px;background:#FF2D20;display:flex;align-items:center;justify-content:space-between;padding:0 56px;z-index:10;}
.top-strip .ticker{font-family:'Space Grotesk';font-size:13px;font-weight:900;letter-spacing:4px;color:#000;}
.top-strip .date{font-family:'Space Grotesk';font-size:13px;font-weight:700;letter-spacing:2px;color:#000;}
.icon-wrap{position:absolute;top:100px;left:56px;width:80px;height:80px;z-index:10;}
.icon-label{position:absolute;top:110px;left:156px;font-family:'Space Grotesk';font-size:12px;font-weight:900;letter-spacing:4px;color:#FF2D20;z-index:10;}
.icon-subtext{position:absolute;top:140px;left:156px;font-size:16px;color:#888;font-weight:400;z-index:10;}
.hero-num{position:absolute;top:220px;left:0;right:0;text-align:center;font-family:'Space Grotesk';font-weight:900;font-size:280px;line-height:1;letter-spacing:-10px;color:#FF2D20;text-shadow:0 0 100px rgba(255,45,32,.6);z-index:10;}
.hero-label{position:absolute;top:520px;left:0;right:0;text-align:center;font-family:'Space Grotesk';font-size:14px;font-weight:900;letter-spacing:6px;color:#F4F4F6;z-index:10;}
.pulse-ring{position:absolute;top:240px;left:50%;width:500px;height:500px;border:2px solid rgba(255,45,32,.12);border-radius:50%;transform:translateX(-50%);pointer-events:none;z-index:5;}
.pulse-ring-2{position:absolute;top:290px;left:50%;width:400px;height:400px;border:1px solid rgba(255,45,32,.07);border-radius:50%;transform:translateX(-50%);pointer-events:none;z-index:5;}
.main-hook{position:absolute;top:620px;left:56px;right:56px;font-size:62px;font-weight:900;line-height:1.1;letter-spacing:-2px;color:#F4F4F6;z-index:10;text-shadow:0 2px 20px rgba(0,0,0,.8);}
.main-hook .accent{color:#FF2D20;}
.meta-line{position:absolute;bottom:120px;left:56px;right:56px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.1);padding-top:16px;z-index:10;}
.meta-left{font-size:13px;color:#888;letter-spacing:1px;font-weight:700;}
.meta-right{font-family:'Space Grotesk';font-size:11px;color:#333;letter-spacing:3px;}
.swipe-cta{position:absolute;bottom:40px;left:56px;right:56px;display:flex;align-items:center;justify-content:space-between;z-index:10;}
.swipe-cta .logo{font-family:'Space Grotesk';font-size:18px;font-weight:900;letter-spacing:2px;}
.swipe-cta .logo .n{color:#FF2D20;}
.swipe-cta .logo .mag{font-size:9px;color:#333;letter-spacing:4px;margin-left:4px;}
.swipe-cta .arrow{font-family:'Space Grotesk';font-size:14px;font-weight:800;color:#FF2D20;letter-spacing:3px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.vertical-label{position:absolute;left:20px;top:50%;transform:rotate(-90deg) translateY(-50%);transform-origin:left center;font-family:'Space Grotesk';font-size:10px;font-weight:800;color:#333;letter-spacing:5px;}
</style></head>
<body>
  <div class="cover-bg"></div>
  <div class="cover-overlay"></div>
  <div class="cover-vignette"></div>
  <div class="grain"></div>
  <div class="noise-lines"></div>
  <div class="top-strip">
    <div class="ticker">■ NOGEAR INTEL</div>
    <div class="date">2026.05.05 (화) · EDITION</div>
  </div>
  <div class="vertical-label">ISSUE / DAILY</div>

  <div class="icon-wrap"><svg viewBox="0 0 64 64" style="width:100%;height:100%;">
<rect x="8" y="24" width="48" height="16" rx="8" fill="none" stroke="#FF2D20" stroke-width="3"/>
<line x1="32" y1="24" x2="32" y2="40" stroke="#FF2D20" stroke-width="3"/>
<circle cx="20" cy="32" r="2" fill="#FF2D20"/>
<circle cx="44" cy="32" r="2" fill="#FF2D20"/>
</svg></div>
  <div class="icon-label">HEALTH ALERT</div>
  <div class="icon-subtext">오늘의 경고 리포트</div>

  <div class="pulse-ring"></div>
  <div class="pulse-ring-2"></div>
  <div class="hero-num">30</div>
  <div class="hero-label">— SHOCKING STAT OF THE DAY —</div>

  <div class="main-hook">D-30: 규칙을 조작하는 선수 vs 규칙을 없앤 대회 — 스포츠는 어디로 가고 있나...</div>

  <div class="meta-line">
    <div class="meta-left">오늘의 바이럴 #95점 · NO FILTER</div>
    <div class="meta-right">VIRAL / WARNING / FACT</div>
  </div>

  <div class="swipe-cta">
    <div class="logo"><span class="n">NO</span>GEAR<span class="mag">MAGAZINE</span></div>
    <div class="arrow">SWIPE →</div>
  </div>
</body></html>
