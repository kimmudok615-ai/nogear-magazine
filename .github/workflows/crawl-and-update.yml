name: NOGEAR Magazine — Auto Crawl & Update

on:
  schedule:
    # 08:00 KST = UTC 23:00 (전날)
    - cron: '0 23 * * *'
    # 20:00 KST = UTC 11:00
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: '크롤링 주제 (선택사항)'
        required: false
        default: 'all'

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests python-dateutil

      - name: Run crawl agent (Haiku)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRAWL_TOPIC: ${{ github.event.inputs.topic || 'all' }}
        run: python3 scripts/crawl_agent.py

      - name: Commit and push updates
        run: |
          git config user.email "magazine@nogear.kr"
          git config user.name "NOGEAR Magazine Bot"
          git add content/articles.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
            git commit -m "crawl: auto-update ${TIMESTAMP}"
            git push
          fi

      - name: Deploy to Vercel
        run: |
          npm install -g vercel --silent
          vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes 2>&1 | tail -3
