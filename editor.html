<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOGEAR EDITOR — 편집실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#030306;--bg2:#07070e;--bg3:#0c0c14;
  --card:rgba(10,10,18,.9);--card2:rgba(14,14,22,.85);
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);
  --text:#F4F4F6;--text2:#9898A8;--text3:#505068;
  --red:#FF2D20;--amber:#F59E0B;--green:#10B981;--blue:#3B82F6;--purple:#A855F7;
  --font:'Noto Sans KR',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}

/* TOP BAR */
.topbar{height:52px;background:rgba(3,3,6,.96);backdrop-filter:blur(30px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:relative;z-index:100;}
.logo{font-size:15px;font-weight:900;letter-spacing:3px;display:flex;align-items:center;gap:10px;white-space:nowrap;}
.logo .n{color:var(--red);}
.logo .tag{font-size:9px;color:var(--text3);letter-spacing:4px;}
.title-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 14px;color:var(--text);font-family:var(--font);font-size:14px;font-weight:700;outline:none;transition:all .2s;max-width:480px;}
.title-input:focus{border-color:rgba(255,45,32,.4);background:rgba(255,45,32,.03);}
.actions{display:flex;gap:6px;margin-left:auto;}
.btn{padding:7px 14px;font-family:var(--font);font-size:11px;font-weight:800;letter-spacing:.5px;border:none;border-radius:5px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-primary{background:var(--red);color:#fff;}
.btn-primary:hover{background:#ff4534;transform:translateY(-1px);box-shadow:0 6px 18px rgba(255,45,32,.3);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);background:rgba(255,255,255,.03);}
.btn-save{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2);}
.btn-save:hover{background:rgba(16,185,129,.15);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);display:inline-block;}
.status-dot.saved{background:var(--green);box-shadow:0 0 8px var(--green);}
.status-dot.dirty{background:var(--amber);box-shadow:0 0 8px var(--amber);}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:1fr 1px 1fr;height:calc(100vh - 52px - 32px);}

/* EDITOR PANE */
.editor-pane{display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
.editor-hd{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0;}
.editor-hd .label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);}
.editor-hd .tools{display:flex;gap:4px;}
.tool-btn{padding:4px 10px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text3);font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;}
.tool-btn:hover{color:var(--text);border-color:var(--border2);background:var(--bg3);}
textarea.editor{flex:1;background:var(--bg);color:var(--text);border:none;padding:32px 40px;font-family:var(--mono);font-size:14px;line-height:1.75;outline:none;resize:none;letter-spacing:.1px;}
textarea.editor::placeholder{color:var(--text3);}

/* DIVIDER */
.divider{width:1px;background:var(--border);cursor:col-resize;position:relative;}
.divider::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:40px;background:var(--border2);border-radius:2px;}

/* PREVIEW PANE */
.preview-pane{display:flex;flex-direction:column;background:var(--bg2);overflow:hidden;}
.preview-hd{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);flex-shrink:0;}
.preview-hd .label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);}
.preview-hd .view-toggle{display:flex;gap:2px;}
.view-btn{padding:4px 10px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text3);font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;}
.view-btn:hover{color:var(--text2);}
.view-btn.act{background:rgba(255,45,32,.08);color:var(--red);border-color:rgba(255,45,32,.2);}
.preview-body{flex:1;overflow-y:auto;padding:48px 56px;}

/* MAGAZINE STYLE PREVIEW */
.mag-preview{max-width:680px;margin:0 auto;}
.mag-preview h1{font-size:clamp(28px,4vw,48px);font-weight:900;line-height:1.1;letter-spacing:-1.2px;margin-bottom:20px;}
.mag-preview h1 .red{color:var(--red);}
.mag-preview h2{font-size:22px;font-weight:800;letter-spacing:-.3px;margin:32px 0 14px;padding-top:24px;border-top:1px solid var(--border);position:relative;}
.mag-preview h2::before{content:'';position:absolute;top:-1px;left:0;width:40px;height:2px;background:var(--red);}
.mag-preview h3{font-size:16px;font-weight:800;letter-spacing:.3px;margin:24px 0 10px;color:var(--red);text-transform:uppercase;font-family:var(--mono);}
.mag-preview p{font-size:15px;line-height:1.85;color:var(--text2);margin-bottom:16px;}
.mag-preview p strong{color:var(--text);font-weight:700;}
.mag-preview p em{color:var(--amber);font-style:normal;font-weight:600;}
.mag-preview blockquote{border-left:3px solid var(--red);padding:16px 20px;margin:20px 0;background:var(--bg3);font-size:15px;line-height:1.8;color:var(--text);font-weight:500;}
.mag-preview code{background:var(--bg3);padding:2px 6px;border-radius:3px;font-family:var(--mono);font-size:13px;color:var(--amber);}
.mag-preview pre{background:var(--bg3);padding:16px 20px;border-radius:8px;font-family:var(--mono);font-size:13px;line-height:1.7;margin:16px 0;overflow-x:auto;border:1px solid var(--border);}
.mag-preview ul,.mag-preview ol{margin:16px 0 16px 24px;color:var(--text2);}
.mag-preview li{margin-bottom:8px;line-height:1.8;}
.mag-preview hr{border:none;border-top:1px solid var(--border);margin:32px 0;}
.mag-preview a{color:var(--blue);text-decoration:underline;}
.mag-preview table{width:100%;border-collapse:collapse;margin:20px 0;font-size:13px;}
.mag-preview th,.mag-preview td{border:1px solid var(--border);padding:10px 14px;text-align:left;}
.mag-preview th{background:var(--bg3);color:var(--text);font-weight:800;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;}
.mag-preview td{color:var(--text2);}

.mag-meta{font-size:10px;letter-spacing:2px;font-weight:800;color:var(--red);margin-bottom:10px;font-family:var(--mono);}
.mag-byline{font-size:11px;color:var(--text3);letter-spacing:1px;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border);display:flex;gap:16px;}

/* BOTTOM BAR */
.bottombar{height:32px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:20px;font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.5px;}
.stat-item{display:flex;align-items:center;gap:6px;}
.stat-item .n{color:var(--text);font-weight:700;}
.stat-pill{padding:2px 8px;border-radius:3px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);}
.auto-save{margin-left:auto;display:flex;align-items:center;gap:6px;}
.viral-est{color:var(--red);font-weight:800;font-family:var(--mono);}

/* TOAST */
.toast{position:fixed;bottom:48px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--green);color:#000;padding:12px 24px;border-radius:6px;font-size:12px;font-weight:900;letter-spacing:.5px;z-index:1000;transition:transform .3s cubic-bezier(.22,1,.36,1);box-shadow:0 8px 32px rgba(16,185,129,.3);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);color:#fff;box-shadow:0 8px 32px rgba(255,45,32,.3);}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:28px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:18px;font-weight:900;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.modal-title .icon{color:var(--red);}
.modal-body{font-size:13px;color:var(--text2);line-height:1.7;}
.modal-close{margin-top:20px;}

.drafts-list{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.draft-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;}
.draft-item:hover{border-color:var(--red);background:rgba(255,45,32,.03);}
.draft-item .dt{font-family:var(--mono);font-size:10px;color:var(--text3);}
.draft-item .dl{font-size:12px;font-weight:700;color:var(--text);}
.draft-delete{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px 8px;border-radius:3px;}
.draft-delete:hover{background:rgba(255,45,32,.1);color:var(--red);}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <span class="n">NO</span>GEAR
    <span class="tag">EDITOR</span>
  </div>
  <input type="text" id="title" class="title-input" placeholder="기사 제목을 입력하세요..." oninput="markDirty(); updatePreview();">
  <div class="actions">
    <button class="btn btn-ghost" onclick="openDrafts()">📂 드래프트</button>
    <button class="btn btn-ghost" onclick="insertTemplate()">📝 템플릿</button>
    <button class="btn btn-ghost" onclick="exportMarkdown()">⬇ .md</button>
    <button class="btn btn-ghost" onclick="copyToClipboard()">📋 복사</button>
    <button class="btn btn-save" onclick="saveDraft()"><span class="status-dot saved" id="saveStatus"></span> 저장</button>
    <button class="btn btn-primary" onclick="publishFeature()">🚀 발행</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- EDITOR -->
  <div class="editor-pane">
    <div class="editor-hd">
      <div class="label">▸ MARKDOWN</div>
      <div class="tools">
        <button class="tool-btn" onclick="insertMd('h1')"># H1</button>
        <button class="tool-btn" onclick="insertMd('h2')">## H2</button>
        <button class="tool-btn" onclick="insertMd('bold')">** B **</button>
        <button class="tool-btn" onclick="insertMd('quote')">"</button>
        <button class="tool-btn" onclick="insertMd('code')">{ }</button>
        <button class="tool-btn" onclick="insertMd('list')">• List</button>
        <button class="tool-btn" onclick="insertMd('hr')">—</button>
      </div>
    </div>
    <textarea id="editor" class="editor" placeholder="# 여기에 기사를 작성하세요

## 서론 — 왜 이 주제인가

## 정상 생리 — 몸은 원래 어떻게 작동하나

## 약물의 개입 — 무엇을 망가뜨리는가

## 연구 현황 — 주요 논문

## NOGEAR 관점 — STAY NATURAL의 근거

## 결론" oninput="markDirty(); updatePreview(); updateStats();"></textarea>
  </div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- PREVIEW -->
  <div class="preview-pane">
    <div class="preview-hd">
      <div class="label">▸ LIVE PREVIEW</div>
      <div class="view-toggle">
        <button class="view-btn act" onclick="setView('magazine')">매거진</button>
        <button class="view-btn" onclick="setView('card')">카드뉴스</button>
        <button class="view-btn" onclick="setView('plain')">Plain</button>
      </div>
    </div>
    <div class="preview-body" id="previewBody">
      <div class="mag-preview" id="preview">
        <div style="text-align:center;padding:80px 0;color:var(--text3);">
          <div style="font-size:48px;margin-bottom:16px;opacity:.3;">✍</div>
          <div style="font-size:13px;letter-spacing:2px;">왼쪽에서 작성을 시작하세요</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="stat-item">글자 <span class="n" id="charCount">0</span></div>
  <div class="stat-item">단어 <span class="n" id="wordCount">0</span></div>
  <div class="stat-item">분 <span class="n" id="readTime">0</span></div>
  <div class="stat-item">바이럴 추정 <span class="viral-est" id="viralEst">—</span></div>
  <div class="stat-item">톤 <span class="stat-pill" id="toneHint">—</span></div>
  <div class="auto-save">
    <span class="status-dot saved" id="autoSaveDot"></span>
    <span id="autoSaveText">저장됨</span>
  </div>
</div>

<!-- DRAFTS MODAL -->
<div class="modal-overlay" id="draftsModal">
  <div class="modal">
    <div class="modal-title"><span class="icon">📂</span> 드래프트 목록</div>
    <div class="modal-body">
      <div>로컬 저장된 드래프트입니다.</div>
      <div class="drafts-list" id="draftsList"></div>
    </div>
    <div class="modal-close">
      <button class="btn btn-ghost" onclick="closeDrafts()">닫기</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">완료</div>

<script>
// ── STATE ──
let isDirty = false;
let autoSaveTimer = null;

const editor = document.getElementById('editor');
const title = document.getElementById('title');
const preview = document.getElementById('preview');

// ── MARKDOWN RENDERER (lightweight) ──
function renderMarkdown(md) {
  if (!md.trim()) return '';
  let html = md;

  // Escape HTML first
  html = html.replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Code blocks
  html = html.replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${code.trim()}</code></pre>`);

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rule
  html = html.replace(/^---+$/gm, '<hr>');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic
  html = html.replace(/(?:^|\s)_(.+?)_/g, ' <em>$1</em>');

  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Lists (simplified)
  html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)(?!\s*<li>)/g, '<ul>$&</ul>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Paragraphs
  html = html.split(/\n\n+/).map(p => {
    p = p.trim();
    if (!p) return '';
    if (p.match(/^<(h[1-6]|ul|ol|blockquote|pre|hr|li|table)/)) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');

  return html;
}

// ── PREVIEW UPDATE ──
function updatePreview() {
  const titleText = title.value.trim() || '(제목 없음)';
  const body = renderMarkdown(editor.value);
  const now = new Date();
  const dateStr = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });

  if (!editor.value.trim() && !title.value.trim()) {
    preview.innerHTML = `<div style="text-align:center;padding:80px 0;color:var(--text3);">
      <div style="font-size:48px;margin-bottom:16px;opacity:.3;">✍</div>
      <div style="font-size:13px;letter-spacing:2px;">왼쪽에서 작성을 시작하세요</div>
    </div>`;
    return;
  }

  preview.innerHTML = `
    <div class="mag-meta">NOGEAR MAGAZINE · FEATURE</div>
    <h1>${escapeHtml(titleText)}</h1>
    <div class="mag-byline">
      <span>NOGEAR EDITORIAL</span>
      <span>·</span>
      <span>${dateStr}</span>
      <span>·</span>
      <span>${getReadTime()}분 읽기</span>
    </div>
    ${body}
  `;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── STATS ──
function updateStats() {
  const text = editor.value;
  const chars = text.length;
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  const readTime = Math.max(1, Math.ceil(chars / 500));

  document.getElementById('charCount').textContent = chars.toLocaleString();
  document.getElementById('wordCount').textContent = words.toLocaleString();
  document.getElementById('readTime').textContent = readTime;

  // 바이럴 추정 (간단한 휴리스틱)
  let score = 40;
  const lower = text.toLowerCase();
  if (/\d+(?:%|배|명|원)/.test(text)) score += 15;
  if (/(파괴|망가|거짓|사망|죽|폭로|충격|경고)/.test(text)) score += 20;
  if (/(논문|연구|임상|PubMed|Circulation)/.test(text)) score += 15;
  if (chars > 500) score += 5;
  if (chars > 2000) score += 5;
  score = Math.min(100, score);
  document.getElementById('viralEst').textContent = score;

  // 톤 힌트
  let tone = '중립';
  if (/(파괴|망가|거짓|사망|죽|폭로|경고|숨겨)/.test(text)) tone = '경고형';
  else if (/(논문|임상|메커니즘|기전|연구)/.test(text)) tone = '해설형';
  else if (/(실체|드러|진실)/.test(text)) tone = '바이럴형';
  document.getElementById('toneHint').textContent = tone;
}

function getReadTime() {
  return Math.max(1, Math.ceil(editor.value.length / 500));
}

// ── DIRTY / AUTO-SAVE ──
function markDirty() {
  isDirty = true;
  document.getElementById('saveStatus').className = 'status-dot dirty';
  document.getElementById('autoSaveDot').className = 'status-dot dirty';
  document.getElementById('autoSaveText').textContent = '저장 중...';

  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    autoSave();
  }, 1500);
}

function autoSave() {
  const data = {
    title: title.value,
    body: editor.value,
    updated_at: new Date().toISOString(),
  };
  localStorage.setItem('nogear_editor_autosave', JSON.stringify(data));
  isDirty = false;
  document.getElementById('saveStatus').className = 'status-dot saved';
  document.getElementById('autoSaveDot').className = 'status-dot saved';
  document.getElementById('autoSaveText').textContent = '자동 저장됨';
}

function loadAutoSave() {
  const saved = localStorage.getItem('nogear_editor_autosave');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      title.value = data.title || '';
      editor.value = data.body || '';
      updatePreview();
      updateStats();
    } catch(e) {}
  }
}

// ── DRAFTS (명시적 저장) ──
function getDrafts() {
  try {
    return JSON.parse(localStorage.getItem('nogear_editor_drafts') || '[]');
  } catch(e) { return []; }
}

function saveDraft() {
  if (!title.value.trim() && !editor.value.trim()) {
    showToast('내용이 비어있습니다', 'error');
    return;
  }
  const drafts = getDrafts();
  const draft = {
    id: Date.now(),
    title: title.value || '(제목 없음)',
    body: editor.value,
    saved_at: new Date().toISOString(),
  };
  drafts.unshift(draft);
  // 최대 20개만 유지
  if (drafts.length > 20) drafts.length = 20;
  localStorage.setItem('nogear_editor_drafts', JSON.stringify(drafts));
  showToast('✓ 드래프트 저장됨');
}

function openDrafts() {
  const drafts = getDrafts();
  const list = document.getElementById('draftsList');
  if (!drafts.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">저장된 드래프트가 없습니다</div>';
  } else {
    list.innerHTML = drafts.map(d => {
      const dt = new Date(d.saved_at).toLocaleString('ko-KR');
      return `
        <div class="draft-item">
          <div onclick="loadDraft(${d.id})" style="flex:1;">
            <div class="dl">${escapeHtml(d.title)}</div>
            <div class="dt">${dt} · ${d.body.length}자</div>
          </div>
          <button class="draft-delete" onclick="deleteDraft(${d.id})">×</button>
        </div>`;
    }).join('');
  }
  document.getElementById('draftsModal').classList.add('show');
}

function closeDrafts() {
  document.getElementById('draftsModal').classList.remove('show');
}

function loadDraft(id) {
  const drafts = getDrafts();
  const d = drafts.find(x => x.id === id);
  if (d) {
    title.value = d.title;
    editor.value = d.body;
    updatePreview();
    updateStats();
    closeDrafts();
    showToast('✓ 드래프트 불러옴');
  }
}

function deleteDraft(id) {
  if (!confirm('이 드래프트를 삭제할까요?')) return;
  const drafts = getDrafts().filter(d => d.id !== id);
  localStorage.setItem('nogear_editor_drafts', JSON.stringify(drafts));
  openDrafts();
}

// ── EXPORT ──
function exportMarkdown() {
  const t = title.value.trim() || 'untitled';
  const fname = t.replace(/[^가-힣a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '') + '.md';
  const content = `# ${title.value}\n\n${editor.value}`;
  const blob = new Blob([content], {type: 'text/markdown;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ ' + fname + ' 다운로드');
}

function copyToClipboard() {
  const content = `# ${title.value}\n\n${editor.value}`;
  navigator.clipboard.writeText(content).then(() => {
    showToast('✓ 클립보드 복사됨');
  }).catch(() => {
    showToast('복사 실패', 'error');
  });
}

// ── PUBLISH (발행 — 매거진으로 보낼 포맷) ──
function publishFeature() {
  if (!title.value.trim() || !editor.value.trim()) {
    showToast('제목과 본문을 입력해주세요', 'error');
    return;
  }
  const now = new Date();
  const dateSlug = now.toISOString().slice(0,10).replace(/-/g,'');
  const displayDate = now.toISOString().slice(0,10);
  const metadata = `---
title: ${title.value}
date: ${displayDate}
author: NOGEAR EDITORIAL
status: published
version: 1
---

`;
  const content = metadata + editor.value;
  const blob = new Blob([content], {type: 'text/markdown;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = dateSlug + '_feature.md';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('✓ 피처 발행 파일 다운로드! editorial/features/ 에 업로드하세요');
}

// ── TEMPLATES ──
function insertTemplate() {
  if (editor.value.trim() && !confirm('현재 내용을 덮어쓸까요?')) return;
  title.value = '[예시] 그 약을 끊으면 몸은 돌아올 것인가';
  editor.value = `## 서론 — 왜 지금 이 주제인가

최근 몇 달간 피트니스 업계에서 스테로이드 관련 사망 사건이 연이어 보도되고 있다. **19세 브라질 보디빌더**, **34세 프로 선수** — 모두 심장마비로 사망했다. 이 사건들이 던지는 질문: **약을 끊으면 몸은 정말 돌아올 수 있는가?**

## 정상 생리 — 몸은 원래 어떻게 작동하나

남성의 테스토스테론은 \`시상하부-뇌하수체-고환 축(HPTA)\`이라는 정밀한 피드백 루프로 조절된다. 시상하부가 GnRH를 박동성으로 분비하면 뇌하수체가 LH/FSH를 분비하고, 고환의 라이디히 세포가 테스토스테론을 만든다.

## 약물의 개입 — 무엇을 망가뜨리는가

외부 안드로겐이 들어오면 이 루프가 **완전히 멈춘다**.

> AAS 투여 후 단 2주 만에 LH가 정상 대비 90% 이상 감소한다는 연구 결과가 있다.
> — PMC4398624

## 연구 현황 — 주요 논문 비교

- **Rasmussen et al. (2016)**: 사이클 종료 후 2년이 지나도 HPTA 축이 회복되지 않는 사례 보고
- **Circulation 2025**: 11년 추적 연구에서 심근병증 위험 9배 증가
- **European Heart Journal 2025**: 프로 보디빌더 121명 중 38%가 급성심장사

## NOGEAR 관점 — STAY NATURAL의 근거

약물로 만든 몸은 약물이 없으면 존재하지 않는다. 일시적 퍼포먼스를 위해 **영구 손상**을 감수할 가치가 있는가?

## 결론

자연 피지크는 느리지만 지속 가능하다. HPTA 축이 평생 작동한다. 심장이 섬유화되지 않는다. 이것이 진짜 퍼포먼스다.

---

**FXXK FAKES. STAY NATURAL.**
`;
  updatePreview();
  updateStats();
  markDirty();
  showToast('✓ 템플릿 삽입됨');
}

// ── MARKDOWN HELPERS ──
function insertMd(type) {
  const e = editor;
  const start = e.selectionStart;
  const end = e.selectionEnd;
  const selected = e.value.slice(start, end);
  let inserted = '';
  switch(type) {
    case 'h1': inserted = '\n# ' + (selected || '제목 1') + '\n'; break;
    case 'h2': inserted = '\n## ' + (selected || '섹션 제목') + '\n'; break;
    case 'bold': inserted = '**' + (selected || '강조') + '**'; break;
    case 'quote': inserted = '\n> ' + (selected || '인용문') + '\n'; break;
    case 'code': inserted = '`' + (selected || '코드') + '`'; break;
    case 'list': inserted = '\n- ' + (selected || '항목') + '\n'; break;
    case 'hr': inserted = '\n\n---\n\n'; break;
  }
  e.value = e.value.slice(0, start) + inserted + e.value.slice(end);
  e.focus();
  e.setSelectionRange(start + inserted.length, start + inserted.length);
  updatePreview();
  updateStats();
  markDirty();
}

// ── VIEW TOGGLE ──
function setView(mode) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('act'));
  event.target.classList.add('act');
  const body = document.getElementById('previewBody');
  if (mode === 'plain') {
    body.innerHTML = '<pre style="font-family:var(--mono);font-size:13px;line-height:1.7;color:var(--text2);white-space:pre-wrap;">' + escapeHtml((title.value ? '# ' + title.value + '\n\n' : '') + editor.value) + '</pre>';
  } else if (mode === 'card') {
    body.innerHTML = `<div style="display:flex;flex-direction:column;gap:16px;align-items:center;">
      <div style="width:380px;height:475px;background:#030306;border:1px solid var(--border);border-radius:8px;padding:32px 28px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:4px;background:var(--red);"></div>
        <div>
          <div style="font-size:10px;font-weight:900;letter-spacing:3px;color:var(--red);margin-bottom:8px;">NOGEAR · FEATURE</div>
          <div style="font-size:24px;font-weight:900;line-height:1.25;letter-spacing:-.5px;margin-top:16px;">${escapeHtml(title.value || '(제목)')}</div>
        </div>
        <div style="font-size:12px;color:var(--text3);line-height:1.7;max-height:200px;overflow:hidden;">${escapeHtml(editor.value.slice(0, 300))}${editor.value.length > 300 ? '...' : ''}</div>
        <div style="display:flex;justify-content:space-between;font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:2px;">
          <span>FXXK FAKES · STAY NATURAL</span>
          <span>→ 01</span>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text3);font-family:var(--mono);">1080×1350 미리보기</div>
    </div>`;
  } else {
    body.innerHTML = '<div class="mag-preview" id="preview"></div>';

}

// ── TOAST ──
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type === 'error' ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── KEYBOARD ──
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveDraft();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
    if (document.activeElement === editor) {
      e.preventDefault();
      insertMd('bold');
    }
  }
});

// ── INIT ──
loadAutoSave();
updateStats();
setInterval(() => { if (isDirty) autoSave(); }, 10000);
</script>
