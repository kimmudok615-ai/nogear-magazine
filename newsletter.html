<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOGEAR NEWSLETTER — 빌더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#030306;--bg2:#07070e;--bg3:#0c0c14;
  --card:rgba(10,10,18,.9);
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);
  --text:#F4F4F6;--text2:#9898A8;--text3:#505068;
  --red:#FF2D20;--amber:#F59E0B;--green:#10B981;--blue:#3B82F6;--purple:#A855F7;
  --font:'Noto Sans KR',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.topbar{height:52px;background:rgba(3,3,6,.96);backdrop-filter:blur(30px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;}
.logo{font-size:15px;font-weight:900;letter-spacing:3px;display:flex;align-items:center;gap:10px;}
.logo .n{color:var(--red);}
.logo .tag{font-size:9px;color:var(--text3);letter-spacing:4px;}
.meta{display:flex;gap:12px;align-items:center;flex:1;}
.meta input,.meta select{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:6px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;}
.meta input:focus,.meta select:focus{border-color:rgba(255,45,32,.4);}
.actions{display:flex;gap:6px;}
.btn{padding:7px 14px;font-size:11px;font-weight:800;letter-spacing:.5px;border:none;border-radius:5px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;font-family:var(--font);}
.btn-primary{background:var(--red);color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(255,45,32,.3);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);}
.btn-email{background:var(--green);color:#000;font-weight:900;}
.btn-email:hover{background:#15d195;transform:translateY(-1px);}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:440px 1fr;height:calc(100vh - 52px);}

/* LEFT: ARTICLE PICKER */
.picker{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.picker-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.picker-hd .label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);display:flex;justify-content:space-between;align-items:center;}
.selected-badge{background:var(--red);color:#fff;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:900;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.filter-chip{padding:4px 10px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--text3);font-size:10px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;font-family:var(--font);}
.filter-chip:hover{color:var(--text2);border-color:var(--border2);}
.filter-chip.act{background:rgba(255,45,32,.08);color:var(--red);border-color:rgba(255,45,32,.3);}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 12px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;}
.search-input:focus{border-color:rgba(255,45,32,.4);}

.article-list{flex:1;overflow-y:auto;padding:8px;}
.article-card{padding:12px 14px;margin-bottom:6px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;position:relative;}
.article-card:hover{border-color:var(--border2);transform:translateX(2px);}
.article-card.selected{border-color:var(--red);background:rgba(255,45,32,.06);}
.article-card.selected::before{content:'';position:absolute;top:0;left:-1px;bottom:0;width:3px;background:var(--red);border-radius:3px 0 0 3px;}
.article-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.article-head .checkbox{width:18px;height:18px;border:2px solid var(--border2);border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.article-card.selected .checkbox{background:var(--red);border-color:var(--red);}
.article-card.selected .checkbox::after{content:'✓';color:#fff;font-size:12px;font-weight:900;}
.article-title{font-size:12px;font-weight:700;line-height:1.4;flex:1;color:var(--text);}
.article-meta{display:flex;gap:8px;font-size:9px;color:var(--text3);align-items:center;letter-spacing:.5px;padding-left:26px;}
.article-meta .cat{background:var(--bg);padding:1px 6px;border-radius:2px;color:var(--text2);font-weight:700;}
.article-meta .score{font-weight:900;font-family:var(--mono);}
.article-meta .score.s90{color:var(--red);}
.article-meta .score.s80{color:var(--amber);}
.article-meta .score.s70{color:var(--blue);}
.article-meta .score.s60{color:var(--text3);}

.empty-list{text-align:center;padding:60px 20px;color:var(--text3);font-size:12px;}

/* RIGHT: PREVIEW */
.preview-pane{display:flex;flex-direction:column;background:#0a0a12;overflow:hidden;}
.preview-hd{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);}
.preview-hd .label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);}
.preview-hd .counter{font-family:var(--mono);font-size:11px;color:var(--text2);}
.preview-body{flex:1;overflow-y:auto;padding:32px 20px 60px;}

/* NEWSLETTER EMAIL STYLE */
.nl-wrapper{max-width:680px;margin:0 auto;background:#030306;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.nl-header{padding:32px 32px 20px;border-bottom:2px solid var(--red);}
.nl-brand{font-size:20px;font-weight:900;letter-spacing:2px;display:flex;align-items:center;gap:10px;}
.nl-brand .n{color:var(--red);}
.nl-brand .mag{font-size:10px;color:var(--text3);letter-spacing:4px;}
.nl-date{font-size:11px;color:var(--text3);letter-spacing:2px;margin-top:8px;font-weight:700;}

.nl-intro{padding:24px 32px;border-bottom:1px solid var(--border);}
.nl-intro-label{font-size:9px;font-weight:900;color:var(--red);letter-spacing:3px;margin-bottom:10px;}
.nl-intro-text{font-size:15px;line-height:1.75;color:var(--text);font-weight:500;}
.nl-intro-text[contenteditable]:focus{outline:2px solid rgba(255,45,32,.3);outline-offset:4px;border-radius:4px;}

.nl-hero{padding:28px 32px;border-bottom:1px solid var(--border);background:rgba(255,45,32,.02);}
.nl-hero-label{font-size:9px;font-weight:900;color:var(--red);letter-spacing:3px;margin-bottom:12px;}
.nl-hero-title{font-size:28px;font-weight:900;line-height:1.2;letter-spacing:-1px;margin-bottom:10px;}
.nl-hero-score{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;background:rgba(255,45,32,.1);border:1px solid rgba(255,45,32,.3);border-radius:3px;font-size:11px;font-weight:900;color:var(--red);font-family:var(--mono);margin-bottom:12px;}
.nl-hero-summary{font-size:14px;line-height:1.75;color:var(--text2);margin-bottom:14px;}
.nl-hero-cta{display:inline-block;padding:10px 20px;background:var(--red);color:#fff;font-size:12px;font-weight:800;letter-spacing:1px;text-decoration:none;border-radius:4px;}

.nl-section-header{padding:20px 32px 12px;}
.nl-section-title{font-size:12px;font-weight:900;color:var(--red);letter-spacing:3px;}
.nl-section-sub{font-size:11px;color:var(--text3);margin-top:4px;}

.nl-articles{padding:0 32px;}
.nl-article{padding:18px 0;border-bottom:1px solid var(--border);display:flex;gap:16px;}
.nl-article:last-child{border-bottom:none;}
.nl-article-num{font-family:var(--mono);font-size:12px;color:var(--red);font-weight:900;min-width:24px;}
.nl-article-body{flex:1;}
.nl-article-title{font-size:15px;font-weight:700;line-height:1.45;margin-bottom:6px;color:var(--text);}
.nl-article-summary{font-size:12px;line-height:1.7;color:var(--text2);margin-bottom:8px;}
.nl-article-meta{font-size:10px;color:var(--text3);display:flex;gap:10px;align-items:center;}
.nl-article-meta .chip{padding:1px 6px;background:var(--bg3);border-radius:2px;color:var(--text2);font-weight:700;letter-spacing:.5px;}

.nl-cta-block{padding:32px;background:var(--red);color:#fff;text-align:center;margin-top:0;}
.nl-cta-title{font-size:24px;font-weight:900;line-height:1.2;letter-spacing:-.5px;margin-bottom:8px;}
.nl-cta-text{font-size:12px;opacity:.9;margin-bottom:16px;line-height:1.6;}
.nl-cta-btn{display:inline-block;padding:11px 28px;background:#000;color:#fff;font-size:12px;font-weight:900;letter-spacing:1px;text-decoration:none;border-radius:4px;}

.nl-footer{padding:24px 32px;background:var(--bg2);font-size:10px;color:var(--text3);text-align:center;letter-spacing:1px;line-height:1.8;}
.nl-footer .brand{font-weight:900;color:var(--text2);letter-spacing:3px;margin-bottom:6px;}

/* DROPZONE (빈 선택 상태) */
.dropzone{max-width:680px;margin:60px auto;padding:80px 20px;text-align:center;border:2px dashed var(--border2);border-radius:12px;color:var(--text3);}
.dropzone-icon{font-size:48px;margin-bottom:16px;opacity:.3;}
.dropzone-title{font-size:14px;font-weight:800;color:var(--text2);letter-spacing:2px;margin-bottom:8px;}
.dropzone-text{font-size:12px;line-height:1.8;}

/* STATUS */
.bottombar{position:fixed;bottom:0;right:0;left:440px;height:44px;background:var(--bg2);border-top:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:16px;font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.5px;}
.bottombar .sp{width:1px;height:14px;background:var(--border2);}
.bottombar .stat{display:flex;gap:6px;align-items:center;}
.bottombar .stat .n{color:var(--text);font-weight:700;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

/* TOAST */
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--green);color:#000;padding:12px 24px;border-radius:6px;font-size:12px;font-weight:900;letter-spacing:.5px;z-index:1000;transition:transform .3s;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* SENT STATUS MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:28px;max-width:540px;width:90%;}
.modal-title{font-size:16px;font-weight:900;margin-bottom:14px;}
.modal-body{font-size:13px;color:var(--text2);line-height:1.7;}
.modal-body input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:10px 14px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;margin-top:8px;}
.modal-footer{margin-top:20px;display:flex;gap:8px;justify-content:flex-end;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo"><span class="n">NO</span>GEAR <span class="tag">NEWSLETTER</span></div>
  <div class="meta">
    <input type="text" id="issue-title" placeholder="이슈 제목 (예: Weekly Intel)" value="WEEKLY INTEL">
    <input type="date" id="issue-date">
    <select id="issue-tone">
      <option value="경고형">경고형</option>
      <option value="해설형">해설형</option>
      <option value="바이럴형">바이럴형</option>
      <option value="깊이형">깊이형</option>
    </select>
  </div>
  <div class="actions">
    <button class="btn btn-ghost" onclick="autoFill()">✨ TOP 자동</button>
    <button class="btn btn-ghost" onclick="clearSelection()">🗑 비우기</button>
    <button class="btn btn-ghost" onclick="downloadHTML()">⬇ HTML</button>
    <button class="btn btn-ghost" onclick="copyHTML()">📋 복사</button>
    <button class="btn btn-email" onclick="openSendModal()">📧 이메일 발송</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- LEFT: PICKER -->
  <div class="picker">
    <div class="picker-hd">
      <div class="label">
        <span>▸ ARTICLE POOL</span>
        <span class="selected-badge"><span id="selCount">0</span> 선택</span>
      </div>
      <input type="text" class="search-input" placeholder="검색..." oninput="filterArticles()">
      <div class="filter-row" id="catFilters">
        <button class="filter-chip act" data-cat="all">ALL</button>
        <button class="filter-chip" data-cat="steroids">스테로이드</button>
        <button class="filter-chip" data-cat="drugs">약물</button>
        <button class="filter-chip" data-cat="science">과학</button>
        <button class="filter-chip" data-cat="exercise">운동</button>
        <button class="filter-chip" data-cat="nutrition">영양</button>
        <button class="filter-chip" data-cat="viral">바이럴</button>
        <button class="filter-chip" data-cat="industry">업계</button>
      </div>
      <div class="filter-row">
        <button class="filter-chip" onclick="setMinScore(0)">전체</button>
        <button class="filter-chip act" onclick="setMinScore(75)">🔥 75+</button>
        <button class="filter-chip" onclick="setMinScore(85)">⚡ 85+</button>
        <button class="filter-chip" onclick="setMinScore(90)">🚨 90+</button>
      </div>
    </div>
    <div class="article-list" id="articleList">
      <div class="empty-list">로딩 중...</div>
    </div>
  </div>

  <!-- RIGHT: PREVIEW -->
  <div class="preview-pane">
    <div class="preview-hd">
      <div class="label">▸ LIVE PREVIEW</div>
      <div class="counter"><span id="selectedWordCount">0</span>자</div>
    </div>
    <div class="preview-body" id="previewBody">
      <div class="dropzone">
        <div class="dropzone-icon">📨</div>
        <div class="dropzone-title">뉴스레터 빌더</div>
        <div class="dropzone-text">왼쪽에서 기사 3-10개 선택하세요<br>또는 <strong style="color:var(--red);">"✨ TOP 자동"</strong> 클릭하면 자동 구성</div>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM -->
<div class="bottombar">
  <div class="stat">아티클 <span class="n" id="totalCount">—</span></div>
  <div class="sp"></div>
  <div class="stat">선택 <span class="n" id="selCount2">0</span></div>
  <div class="sp"></div>
  <div class="stat">예상 발송 시간 <span class="n">15초</span></div>
  <div class="sp"></div>
  <div class="stat">포맷 <span class="n">HTML 이메일</span></div>
</div>

<!-- SEND MODAL -->
<div class="modal-overlay" id="sendModal">
  <div class="modal">
    <div class="modal-title">📧 이메일 발송</div>
    <div class="modal-body">
      <div>수신자 이메일을 입력하세요:</div>
      <input type="text" id="sendEmails" placeholder="email1@example.com, email2@example.com" value="nowornever20031206@gmail.com">
      <div style="margin-top:14px;font-size:11px;color:var(--text3);">
        ⚠️ 실제 발송은 <code>scripts/send_newsletter.py</code>에서 처리됩니다.<br>
        현재는 발송용 HTML + 주소록을 다운로드합니다.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSendModal()">취소</button>
      <button class="btn btn-email" onclick="prepareNewsletterSend()">준비 완료 (다운로드)</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">완료</div>

<script>
let allArticles = [];
let selected = [];  // 선택된 기사 ID 순서
let currentCat = 'all';
let minScore = 75;
let searchQuery = '';

// ── INIT ──
async function loadArticles() {
  try {
    const r = await fetch('./content/articles.json?t=' + Date.now());
    const data = await r.json();
    allArticles = (data.news || []).map((a, i) => ({...a, _id: 'a' + i}));

    // 명예의 전당도 추가
    try {
      const fr = await fetch('./content/featured.json?t=' + Date.now());
      const fd = await fr.json();
      const featuredOnly = (fd.articles || []).filter(fa =>
        !allArticles.some(a => a.title === fa.title)
      ).map((a, i) => ({...a, _id: 'f' + i, featured: true}));
      allArticles.push(...featuredOnly);
    } catch(e) {}

    document.getElementById('totalCount').textContent = allArticles.length;
    renderArticleList();
  } catch(e) {
    document.getElementById('articleList').innerHTML = '<div class="empty-list">로딩 실패</div>';
  }
}

// ── ARTICLE LIST ──
function renderArticleList() {
  const filtered = allArticles.filter(a => {
    if (currentCat !== 'all' && a.category !== currentCat) return false;
    if ((a.viral_score || 0) < minScore) return false;
    if (searchQuery) {
      const text = ((a.title || '') + ' ' + (a.summary || '')).toLowerCase();
      if (!text.includes(searchQuery.toLowerCase())) return false;
    }
    return true;
  }).sort((x,y) => (y.viral_score||0) - (x.viral_score||0));

  const list = document.getElementById('articleList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-list">조건에 맞는 기사 없음</div>';
    return;
  }

  list.innerHTML = filtered.map(a => {
    const isSelected = selected.includes(a._id);
    const score = a.viral_score || 0;
    const scoreClass = score >= 90 ? 's90' : score >= 80 ? 's80' : score >= 70 ? 's70' : 's60';
    const emoji = a.viral_emoji || '⚪';
    const cat = a.category_ko || a.category || '';
    const featured = a.featured ? '<span style="color:var(--amber);">★</span> ' : '';
    return `
      <div class="article-card${isSelected ? ' selected' : ''}" onclick="toggleSelect('${a._id}')" data-id="${a._id}">
        <div class="article-head">
          <div class="checkbox"></div>
          <div class="article-title">${featured}${escHtml(a.title || '')}</div>
        </div>
        <div class="article-meta">
          <span class="score ${scoreClass}">${emoji} ${score}</span>
          <span class="cat">${escHtml(cat)}</span>
          <span>${a.date || ''}</span>
        </div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toggleSelect(id) {
  const idx = selected.indexOf(id);
  if (idx >= 0) {
    selected.splice(idx, 1);
  } else {
    selected.push(id);
  }
  updateCount();
  renderArticleList();
  renderPreview();
}

function updateCount() {
  document.getElementById('selCount').textContent = selected.length;
  document.getElementById('selCount2').textContent = selected.length;
}

function clearSelection() {
  selected = [];
  updateCount();
  renderArticleList();
  renderPreview();
  showToast('✓ 선택 비움');
}

function autoFill() {
  // TOP 6 자동 선택 (바이럴 높은 순)
  const top = [...allArticles]
    .sort((x,y) => (y.viral_score||0) - (x.viral_score||0))
    .slice(0, 6);
  selected = top.map(a => a._id);
  updateCount();
  renderArticleList();
  renderPreview();
  showToast('✓ TOP 6 자동 선택');
}

// ── FILTERS ──
document.getElementById('catFilters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-chip');
  if (!btn) return;
  document.querySelectorAll('#catFilters .filter-chip').forEach(b => b.classList.remove('act'));
  btn.classList.add('act');
  currentCat = btn.dataset.cat;
  renderArticleList();
});

function setMinScore(score) {
  minScore = score;
  document.querySelectorAll('.filter-row .filter-chip').forEach(b => {
    if (b.closest('#catFilters')) return;
    b.classList.remove('act');
  });
  event.target.classList.add('act');
  renderArticleList();
}

function filterArticles() {
  searchQuery = document.querySelector('.search-input').value.trim();
  renderArticleList();
}

// ── PREVIEW ──
function getSelectedArticles() {
  return selected.map(id => allArticles.find(a => a._id === id)).filter(Boolean);
}

function renderPreview() {
  const arts = getSelectedArticles();
  const body = document.getElementById('previewBody');

  if (!arts.length) {
    body.innerHTML = `<div class="dropzone">
      <div class="dropzone-icon">📨</div>
      <div class="dropzone-title">뉴스레터 빌더</div>

function genIntroText(arts, title) {
  const topScore = arts[0].viral_score || 0;
  const highRisk = arts.filter(a => (a.category === 'steroids' || a.category === 'drugs')).length;
  const scientific = arts.filter(a => a.source_type === 'journal').length;

  if (highRisk >= arts.length / 2) {
    return `이번 주는 <strong>약물의 대가</strong>에 집중했습니다. 바이럴 ${topScore}점짜리 이슈 포함 ${arts.length}건. 전부 논문 또는 검증된 사례 기반입니다. ${scientific}건이 피어리뷰 저널 출처.`;
  }
  if (scientific >= arts.length / 2) {
    return `이번 호는 <strong>과학</strong>입니다. 피어리뷰 논문 ${scientific}건, 총 ${arts.length}개 기사. 숫자가 말하는 진실만 모았습니다.`;
  }
  return `이번 주 NOGEAR가 선별한 ${arts.length}개 기사. 바이럴 최고 ${topScore}점. 숨기지 않고, 그대로 전달합니다.`;
}

}

function downloadHTML() {
  const html = getEmailHTML();
  if (!html) { showToast('먼저 기사를 선택하세요'); return; }
  const date = document.getElementById('issue-date').value || new Date().toISOString().slice(0,10);
  const blob = new Blob([html], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `NOGEAR_newsletter_${date}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('✓ HTML 다운로드');
}

function copyHTML() {
  const html = getEmailHTML();
  if (!html) { showToast('먼저 기사를 선택하세요'); return; }
  navigator.clipboard.writeText(html).then(() => {
    showToast('✓ HTML 클립보드 복사');
  });
}

function openSendModal() {
  if (!selected.length) { showToast('먼저 기사를 선택하세요'); return; }
  document.getElementById('sendModal').classList.add('show');
}

function closeSendModal() {
  document.getElementById('sendModal').classList.remove('show');
}

function prepareNewsletterSend() {
  const emails = document.getElementById('sendEmails').value.trim();
  if (!emails) { showToast('이메일 주소를 입력하세요'); return; }

  const html = getEmailHTML();
  const date = document.getElementById('issue-date').value || new Date().toISOString().slice(0,10);
  const subject = (document.getElementById('issue-title').value || 'WEEKLY INTEL') + ' · ' + date;

  // 발송 페이로드 다운로드
  const payload = {
    subject: `📡 NOGEAR ${subject}`,
    to: emails.split(',').map(e => e.trim()),
    html: html,
    generated_at: new Date().toISOString(),
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `newsletter_${date}_payload.json`;
  a.click();
  URL.revokeObjectURL(a.href);

  closeSendModal();
  showToast('✓ 발송 준비 완료 — send_newsletter.py 실행');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
